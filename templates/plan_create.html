{% extends "base.html" %}
{% block title %}制定专属计划 - ZENITH FITNESS{% endblock %}

{% block css %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
        --primary: #0ea5e9;
        --primary-hover: #0284c7;
        /* 修改为与社区/商城一致的质感灰蓝色调，彻底告别纯白 */
        --bg-grad: #f1f5f9;
        --card-bg: rgba(255, 255, 255, 0.95);
        --text-main: #1E293B;
        --text-sub: #64748B;
        --input-bg: #ffffff;
        --radius-xl: 24px;
        --radius-lg: 16px;
    }
   body {
        background: var(--bg-grad) !important;
        font-family: 'Inter', sans-serif;
        padding-bottom: 60px;
        min-height: 100vh;
    }
    .page-subnav { display: flex; justify-content: center; gap: 15px; margin: 40px auto 30px; max-width: 800px; background: var(--card-bg); padding: 10px; border-radius: 50px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
    .page-subnav a { flex: 1; text-align: center; padding: 12px 20px; border-radius: 40px; font-weight: 700; text-decoration: none; color: var(--text-sub); transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .page-subnav a:hover { background: rgba(255,255,255,0.6); }
    .page-subnav a.active { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }

    .app-container { max-width: 850px; margin: 0 auto; padding: 0 20px; }
    .page-header { text-align: center; margin-bottom: 30px; }
    .page-title { font-size: 32px; font-weight: 900; color: var(--text-main); margin-bottom: 10px; letter-spacing: -0.5px; }


/* 统一所有页面的卡片样式，消除边框视觉差 */
    .glass-card
 {
        background: var
(--card-bg);
        border-radius: var
(--radius-xl);
        padding: 35px
;
        margin-bottom: 25px
;
        box-shadow: 0 10px 40px rgba(0,0,0,0.03
);
        border: 1px solid rgba(255,255,255,1
);
        backdrop-
filter: blur(20px
);
    }
    .section-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--text-main); }
    .section-title i { color: var(--primary); font-size: 22px; }

    .target-card { background: linear-gradient(135deg, #7C3AED 0%, #E11D48 100%); color: #fff; border: none; box-shadow: 0 15px 35px rgba(225, 29, 72, 0.2); display: flex; justify-content: space-between; align-items: center; }
    .target-card .label { font-size: 15px; opacity: 0.9; font-weight: 600; margin-bottom: 8px; }
    .target-card .value { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 10px; }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .input-group-modern { display: flex; align-items: center; background: var(--input-bg); border-radius: var(--radius-lg); padding: 14px 20px; border: 2px solid transparent; transition: 0.3s; }
    .input-group-modern:focus-within { border-color: var(--primary); background: #fff; }
    .input-group-modern i { color: var(--text-sub); font-size: 18px; width: 28px; }
    .input-group-modern select { border: none; background: transparent; width: 100%; font-size: 15px; font-weight: 600; color: var(--text-main); outline: none; }

    .pill-group { display: flex; gap: 12px; }
    .pill-group label { flex: 1; cursor: pointer; }
    .pill-group input[type="radio"] { display: none; }
    .pill-label { display: flex; align-items: center; justify-content: center; padding: 14px; background: var(--input-bg); border-radius: var(--radius-lg); font-size: 15px; font-weight: 600; color: var(--text-sub); transition: 0.3s; }
    .pill-group input[type="radio"]:checked + .pill-label { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }

    /* 运动计划卡片 */
    .workout-list { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }
    .workout-card { background: #fff; border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: center; border: 1px solid rgba(0,0,0,0.04); transition: 0.3s; }
    .workout-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.06); border-color: #E11D48; }
    .workout-icon { width: 54px; height: 54px; border-radius: 16px; background: #FFF1F2; color: #E11D48; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 20px; flex-shrink: 0; }
    .workout-info { flex: 1; }
    .workout-info h4 { font-size: 17px; font-weight: 800; color: var(--text-main); margin-bottom: 6px; }
    .workout-info p { font-size: 14px; color: var(--text-sub); margin: 0; font-weight: 600; display: flex; gap: 15px; }
    .workout-info p span i { margin-right: 4px; color: #cbd5e1; }
    .workout-cal { font-size: 22px; font-weight: 900; color: #E11D48; text-align: right; }
    .workout-cal small { font-size: 12px; font-weight: 700; color: var(--text-sub); display: block; margin-top: -2px; }

    .total-cal-box { display: flex; align-items: center; justify-content: space-between; padding: 24px 32px; background: linear-gradient(135deg, #FFF1F2, #FFE4E6); border-radius: var(--radius-lg); margin-top: 24px; border: 1px dashed rgba(225, 29, 72, 0.3); }
    .total-cal-box div { font-size: 18px; font-weight: 800; color: #BE123C; display: flex; align-items: center; gap: 10px; }
    .total-cal-box span { font-size: 38px; font-weight: 900; color: #E11D48; line-height: 1; }

   .btn-submit-modern
 {
        display
: flex;
        justify-content
: center;
        align-items
: center;
        gap:
10px
;
        width: 100%
;
        padding: 18px
;
        background: #0f172a
;
        color: #fff
;
        border
: none;
        border-radius: var
(--radius-xl);
        font-size: 1.15rem
;
        font-weight: 800
;
        cursor
: pointer;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2
);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1
);
        margin-top: 20px
;
    }
    .btn-submit-modern:hover
 {
        background: #000000
;
        transform: translateY(-3px
);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3
);
    }
</style>
{% endblock %}

{% block content %}
<div class="app-container">
    <nav class="page-subnav">
        <a href="/profile"><i class="fa-solid fa-id-card"></i> 健康档案</a>
        <a href="/tcm/recommend"><i class="fa-solid fa-bowl-food"></i> 饮食方案</a>
        <a href="/plan-create" class="active"><i class="fa-solid fa-dumbbell"></i> 训练计划</a>
    </nav>

    <div class="page-header">
        <h1 class="page-title">专属计划引擎</h1>
        <p class="text-muted">根据您的身体数据与可用器械，动态编排每日训练动作。</p>
    </div>

    <div class="glass-card target-card">
        <div>
            <div class="label">主线健身目标</div>
            <div class="value" id="displayGoal"><i class="fa-solid fa-fire"></i> 减脂降重</div>
        </div>
        <i class="fa-solid fa-bullseye" style="font-size: 45px; opacity: 0.3;"></i>
    </div>

    <div class="glass-card">
        <h2 class="section-title"><i class="fa-solid fa-sliders"></i> 训练环境设定</h2>
        <div class="form-grid mb-4">
            <div>
                <label class="text-muted fw-bold small ms-1 mb-2 d-block">运动场景</label>
                <div class="input-group-modern border-0">
                    <i class="fa-solid fa-location-dot"></i>
                    <select id="pl_env" onchange="generatePlan()">
                        <option value="居家">🏠 居家 / 室内</option>
                        <option value="户外">🌳 户外 / 公园</option>
                        <option value="健身房">🏋️ 商业健身房</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="text-muted fw-bold small ms-1 mb-2 d-block">可用器械配置</label>
                <div class="input-group-modern border-0">
                    <i class="fa-solid fa-box-open"></i>
                    <select id="pl_equip" onchange="generatePlan()">
                        <option value="自重">徒手 / 无器械</option>
                        <option value="小器械">轻量器械 (哑铃/弹力带)</option>
                        <option value="全器械">全套大型器械 (需选健身房)</option>
                    </select>
                </div>
            </div>
        </div>

        <label class="text-muted fw-bold small ms-1 mb-2 d-block">理想训练排期频率</label>
        <div class="pill-group">
            <label><input type="radio" name="freq" value="low" onchange="generatePlan()"><span class="pill-label">1-2天 (低频)</span></label>
            <label><input type="radio" name="freq" value="mid" checked onchange="generatePlan()"><span class="pill-label">3-4天 (推荐)</span></label>
            <label><input type="radio" name="freq" value="high" onchange="generatePlan()"><span class="pill-label">5天+ (高频)</span></label>
        </div>
    </div>

    <div class="glass-card">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
            <h2 class="section-title mb-0 border-0 pb-0"><i class="fa-solid fa-list-check"></i> 今日生成的计划</h2>
            <button class="btn btn-sm btn-light text-primary fw-bold" onclick="generatePlan()" style="border-radius:20px; background: #f1f5f9;"><i class="fa-solid fa-rotate me-1"></i> 换一套</button>
        </div>

        <div class="workout-list" id="workoutList">
            </div>

        <div class="total-cal-box">
            <div><i class="fa-solid fa-fire-flame-curved"></i> 预计总消耗</div>
            <div><span id="totalKcalDisplay">0</span> <small style="color:#BE123C; margin-top:12px;">kcal</small></div>
        </div>
    </div>

    <button class="btn-submit-modern" onclick="saveAndStart()">
        <i class="fa-solid fa-play-circle fs-4"></i> 保存并打卡今日训练
    </button>
</div>

{% block js %}
<script>
    let globalPlan = [];

    // 动作库数据模拟引擎
    const exerciseDB = {
        '减脂降重': {
            '居家': [{n:'开合跳燃脂', s:'4组 × 45秒', k:80, i:'fa-child-reaching'}, {n:'波比跳 HIIT', s:'5组 × 1分钟', k:120, i:'fa-person-running'}, {n:'高抬腿', s:'4组 × 1分钟', k:90, i:'fa-person-arrow-up-from-line'}],
            '户外': [{n:'恒速慢跑', s:'40 分钟', k:320, i:'fa-person-running'}, {n:'坡度快走', s:'30 分钟', k:200, i:'fa-person-walking'}, {n:'户外跳绳', s:'5组 × 2分钟', k:150, i:'fa-link'}],
            '健身房': [{n:'椭圆机燃脂', s:'35 分钟', k:300, i:'fa-bicycle'}, {n:'动感单车', s:'30 分钟', k:350, i:'fa-biking'}, {n:'划船机', s:'20 分钟', k:180, i:'fa-anchor'}]
        },
        '增肌塑形': {
            '居家': [{n:'自重深蹲', s:'4组 × 15次', k:70, i:'fa-person-arrow-up-from-line'}, {n:'标准俯卧撑', s:'4组 × 12次', k:60, i:'fa-hands-holding'}, {n:'仰卧起坐', s:'3组 × 20次', k:40, i:'fa-child'}],
            '健身房': [{n:'杠铃卧推', s:'4组 × 8-12次', k:100, i:'fa-dumbbell'}, {n:'高位下拉', s:'4组 × 10次', k:90, i:'fa-arrow-down-short-wide'}, {n:'腿举', s:'4组 × 10次', k:120, i:'fa-weight-hanging'}],
            '户外': [{n:'引体向上', s:'4组 × 力竭', k:80, i:'fa-arrow-up'}, {n:'双杠臂屈伸', s:'3组 × 10次', k:60, i:'fa-bars'}, {n:'冲刺跑', s:'10趟 × 50米', k:150, i:'fa-person-running-fast'}]
        },
        '保持健康': {
            '居家': [{n:'全身筋膜拉伸', s:'15 分钟', k:40, i:'fa-yin-yang'}, {n:'平板支撑', s:'3组 × 1分钟', k:30, i:'fa-ruler-horizontal'}, {n:'靠墙静蹲', s:'3组 × 45秒', k:35, i:'fa-chair'}],
            '户外': [{n:'公园快步走', s:'30 分钟', k:150, i:'fa-person-walking'}, {n:'八段锦/太极', s:'20 分钟', k:60, i:'fa-leaf'}, {n:'轻松骑行', s:'30 分钟', k:120, i:'fa-bicycle'}],
            '健身房': [{n:'跑步机热身', s:'15 分钟', k:100, i:'fa-person-running'}, {n:'轻重量器械循环', s:'20 分钟', k:120, i:'fa-dumbbell'}, {n:'瑜伽垫拉伸', s:'15 分钟', k:40, i:'fa-yin-yang'}]
        }
    };

    function generatePlan() {
        // 读取 LocalStorage 目标
        const localData = JSON.parse(localStorage.getItem('zenith_health_data')) || {};
        const goal = localData.goal || '减脂降重'; // 默认减脂

        // 动态设置顶部展示
        const goalDisplay = document.getElementById('displayGoal');
        if(goal.includes('减脂')) goalDisplay.innerHTML = '<i class="fa-solid fa-fire"></i> 减脂降重';
        else if(goal.includes('增肌')) goalDisplay.innerHTML = '<i class="fa-solid fa-dumbbell"></i> 增肌塑形';
        else goalDisplay.innerHTML = '<i class="fa-solid fa-heart-pulse"></i> 保持健康';

        const env = document.getElementById('pl_env').value;
        const equip = document.getElementById('pl_equip').value;

        // 如果用户选了健身房，强制提示全器械
        if(env === '健身房' && equip === '自重') {
            document.getElementById('pl_equip').value = '全器械';
        } else if (env === '居家' && equip === '全器械') {
            document.getElementById('pl_equip').value = '小器械';
        }

        // 从伪数据库获取动作
        let sourcePool = exerciseDB[goal.substring(0,4)] ? exerciseDB[goal.substring(0,4)][env] : exerciseDB['减脂降重']['居家'];
        if(!sourcePool) sourcePool = exerciseDB['保持健康']['居家'];

        // 混入一个固定的热身动作
        globalPlan = [
            { n: '动态热身激活', s: '5 分钟', k: 25, i: 'fa-person-walking-arrow-right' },
            ...sourcePool
        ];

        renderPlan();
    }

    function renderPlan() {
        const list = document.getElementById('workoutList');
        let total = 0;
        let html = '';

        globalPlan.forEach(item => {
            total += item.k;
            html += `
                <div class="workout-card">
                    <div class="workout-icon"><i class="fa-solid ${item.i}"></i></div>
                    <div class="workout-info">
                        <h4>${item.n}</h4>
                        <p><span><i class="fa-solid fa-clock"></i> ${item.s}</span></p>
                    </div>
                    <div class="workout-cal">
                        ${item.k} <small>kcal</small>
                    </div>
                </div>
            `;
        });

        list.innerHTML = html;
        // 数字滚动特效
        const totalEl = document.getElementById('totalKcalDisplay');
        let current = 0;
        const timer = setInterval(() => {
            current += 15;
            if(current >= total) { current = total; clearInterval(timer); }
            totalEl.innerText = current;
        }, 20);
    }

    function saveAndStart() {
        // 保存给 dashboard 用的格式
        const dashboardPlan = globalPlan.map(item => ({
            name: item.n,
            duration: item.s,
            kcal: item.k,
            icon: item.i.replace('fa-', 'bi-').replace('solid ', ''), // 简单映射图标
            completed: false
        }));
        localStorage.setItem('currentPlan', JSON.stringify(dashboardPlan));

        alert('🎉 计划归档成功！正在为您开启今日训练...');
        window.location.href = '/health-dashboard'; // 路由跳转到后台数据面板
    }

    document.addEventListener('DOMContentLoaded', () => {
        generatePlan();
    });
</script>
{% endblock %}
{% endblock %}
